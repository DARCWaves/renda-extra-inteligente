<?xml version="1.0" encoding="UTF-8"?>
<svg width="320" height="80" viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Fundo glow -->
  <defs>
    <linearGradient id="gradPrimary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00FFA3"/>
      <stop offset="100%" stop-color="#00BCD4"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ícone (gráfico + foguete minimalista) -->
  <g transform="translate(10,10)">

    <!-- Base -->
    <rect x="0" y="30" width="50" height="8" rx="4" fill="#0f172a"/>

    <!-- Barras crescimento -->
    <rect x="6" y="20" width="6" height="10" rx="2" fill="url(#gradPrimary)"/>
    <rect x="16" y="15" width="6" height="15" rx="2" fill="url(#gradPrimary)"/>
    <rect x="26" y="8" width="6" height="22" rx="2" fill="url(#gradPrimary)"/>
    <rect x="36" y="2" width="6" height="28" rx="2" fill="url(#gradPrimary)"/>

    <!-- Foguete -->
    <path d="M45 0 C55 5, 55 25, 45 30 C35 25, 35 5, 45 0Z" fill="url(#gradPrimary)" filter="url(#glow)"/>
    
    <!-- Fogo -->
    <path d="M45 30 C42 38, 48 38, 45 30Z" fill="#FFA500"/>

  </g>

  <!-- Texto principal -->
  <text x="80" y="38"
        font-family="Arial, Helvetica, sans-serif"
        font-size="18"
        font-weight="900"
        fill="#00FFA3">
    Renda Extra
  </text>

  <text x="80" y="60"
        font-family="Arial, Helvetica, sans-serif"
        font-size="18"
        font-weight="900"
        fill="#00BCD4">
    Inteligente
  </text>

</svg>
